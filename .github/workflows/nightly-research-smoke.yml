name: Nightly Research Smoke

on:
  schedule:
    - cron: '23 3 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-research-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly:
    name: Nightly smoke pack
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lightweight research smoke pack
        run: |
          python -m unittest tests_py.test_tac_scm_real011 tests_py.test_tac_scm_real017_audit
          python -m pytest tests/test_exp009_smoke.py tests/test_exp009b_smoke.py
          python kaggle/benchmark_tac_scm_real017_audit.py --seeds 0 1 --eval-samples 64 --output-json outputs/nightly/real017_audit_metrics.json
          python - <<'PY'
          import json
          from pathlib import Path
          from tac_sie.experiments import run_exp009
          metrics = run_exp009(train_steps=80, executor_epochs=150, seed=9)
          output = Path('outputs/nightly/exp009_metrics.json')
          output.parent.mkdir(parents=True, exist_ok=True)
          output.write_text(json.dumps(metrics, indent=2, sort_keys=True), encoding='utf-8')
          print(json.dumps(metrics, indent=2, sort_keys=True))
          PY

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-research-smoke-results
          path: outputs/nightly/
          if-no-files-found: error
