name: TAC Core Validation

on:
  workflow_dispatch:
    inputs:
      benchmarks:
        description: Comma-separated benchmark list
        required: false
        default: 'tac251,tac252,tac267,tac270,tac272'
      seeds:
        description: Seed count or seed argument expected by script
        required: false
        default: '5'
      cases:
        description: Cases per benchmark
        required: false
        default: '50'

concurrency:
  group: tac-core-validation-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  tac-core-validation:
    name: Run TAC core validation pack
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run TAC core validation
        env:
          BENCHMARKS: ${{ github.event.inputs.benchmarks }}
          SEEDS: ${{ github.event.inputs.seeds }}
          CASES: ${{ github.event.inputs.cases }}
        run: |
          mkdir -p runs/kaggle_validation
          python experiments/kaggle_validate_tac_core.py \
            --benchmarks "$BENCHMARKS" \
            --seeds "$SEEDS" \
            --cases "$CASES" \
            --output runs/kaggle_validation/tac_core_validation.json

      - name: Upload TAC core validation artifact
        uses: actions/upload-artifact@v4
        with:
          name: tac-core-validation-results
          path: runs/kaggle_validation/tac_core_validation.json
          if-no-files-found: error
