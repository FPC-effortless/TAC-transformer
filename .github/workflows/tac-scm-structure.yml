name: TAC-SCM Structure Validation

on:
  workflow_dispatch:
  schedule:
    - cron: '41 3 * * 2'

permissions:
  contents: read

concurrency:
  group: tac-scm-structure-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  tac-scm-structure:
    name: Run TAC-SCM structure tests
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest torch
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run TAC-SCM structure tests
        run: |
          python -m unittest \
            tests_py.test_tac_scm_real004 \
            tests_py.test_tac_scm_real005 \
            tests_py.test_tac_scm_real006 \
            tests_py.test_tac_scm_real011 \
            tests_py.test_tac_scm_real017_audit

      - name: Write validation summary
        if: always()
        run: |
          mkdir -p outputs/ci
          cat > outputs/ci/tac_scm_structure_summary.md <<'EOF'
          # TAC-SCM Structure Validation

          This workflow runs the current structure-centric validation tests:

          - REAL004 structure-to-behavior smoke/contract tests
          - REAL005 bridge stability smoke/contract tests
          - REAL006 controlled-realistic transfer smoke/contract tests
          - REAL011 benchmark-validity tests
          - REAL017 audit guardrail tests
          EOF

      - name: Upload validation summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tac-scm-structure-summary
          path: outputs/ci/tac_scm_structure_summary.md
          if-no-files-found: warn
