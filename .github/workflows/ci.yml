name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python import smoke
        run: |
          python - <<'PY'
          import tac_transformer
          print('tac_transformer import ok')
          PY

      - name: Core architecture smoke tests
        run: |
          python -m unittest tests_py.test_tac_transformer tests_py.test_tac_serving

  node-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend tests
        run: npm test -- --run

      - name: Frontend build
        run: npm run build
